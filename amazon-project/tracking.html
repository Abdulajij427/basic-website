<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tracking</title>

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/header.css">
    <link rel="stylesheet" href="styles/pages/tracking.css">

</head>
<body>
    
    <div class="header">
        <div class="left-section">
            <a class="index.html" href="index.html">
                <img src="images/logo-white.png" class="logo"/>
                
            </a>
        </div>

        <div class="middle-section">
            <input placeholder = "search"  class="input-search" type="text">
            <button class="search-button" >
                <img src="images/icons/search-icon.png" class="search-icon"/>
            </button>

        </div>

        <div class="right-section">
            <a class="orders-links header-link" href="orders.html">
                <span class="orders-text">Return & orders</span>
            </a>

            <a class="cart-link header-link" href="checkout.html">
                <img src="images/icons/cart-icon.png" class="cart-icon"/>
                <div class="cart-quantity">3</div>
                <div class="cart-text">Cart</div>
            </a>
        </div>
    </div>

    <div class="tracking-page">
        <div class="order-tracking">
            <a class="back-to-orders-link link-primary" href="orders.html">
                View all orders
            </a>
        

        
            <div class="delivery-date">
                Arriving on Tuesday, July 7
            </div>

            <div class="product-info">
                2-slot-toaster
            </div> 

            <div class="product-quantity">
                <span>Quantity: 2</span>
            </div>

            <div class="product-image">
                <img class="image"src="images/products/2-slot-toaster-white.jpg"/>
            </div>

            <div class="progress-labels-container">
                <div class="progress-label">
                    Preparing
                </div>

                <div class="progress-label current-status">
                    Shipped
                </div>

                <div class="progress-label">
                    Delivered
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

</body>
</html>
